spring:
  datasource:
    url: jdbc:h2:mem:order_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

feign:
  client:
    config:
      product-service:
        connectTimeout: 500
        readTimeout: 1000
