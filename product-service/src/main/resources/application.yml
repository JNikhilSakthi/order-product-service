server:
  port: 8081

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:product_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:product_user}
    password: ${DB_PASSWORD:product_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: product-service-pool
      maximum-pool-size: 10
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  sql:
    init:
      mode: always
      platform: mysql

  jackson:
    default-property-inclusion: non_null
    # write-dates-as-timestamps moved from spring.jackson.serialization.* to
    # spring.jackson.datatype.datetime.* in Jackson 3 / Spring Boot 4.0:
    # WRITE_DATES_AS_TIMESTAMPS is now a DateTimeFeature, not a
    # SerializationFeature, so the old key silently stopped binding.
    datatype:
      datetime:
        write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.medha.orderproductservice.product: INFO
